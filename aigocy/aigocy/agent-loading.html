<script>

    var p=window.location.pathname;
    if(p.indexOf('/en/')===- 1){
      var newPath='/en/'+p.replace(/^\/+/,'');

})();

    <style>
        /* === Loading Screen === */
        .loading-screen {
            background: var(--neutral-900);
            min-height: calc(100vh - 72px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px 100px;
            position: relative;
            overflow: hidden;
        }

        /* Background glow */
        .loading-screen::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .loading-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            position: relative;
            z-index: 2;
            max-width: 560px;
            width: 100%;
        }

        /* Waveform */
        .loading-wave {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            height: 80px;
        }
        .lbar {
            width: 6px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.7);
            animation: loadWave 1.4s ease-in-out infinite;
            transform-origin: center;
        }
        .lbar:nth-child(1)  { height: 18px; animation-delay: 0s;    }
        .lbar:nth-child(2)  { height: 30px; animation-delay: 0.1s;  }
        .lbar:nth-child(3)  { height: 44px; animation-delay: 0.2s;  }
        .lbar:nth-child(4)  { height: 60px; animation-delay: 0.3s;  }
        .lbar:nth-child(5)  { height: 74px; animation-delay: 0.4s;  }
        .lbar:nth-child(6)  { height: 80px; animation-delay: 0.5s;  background: rgba(255,255,255,0.9); }
        .lbar:nth-child(7)  { height: 74px; animation-delay: 0.4s;  }
        .lbar:nth-child(8)  { height: 60px; animation-delay: 0.3s;  }
        .lbar:nth-child(9)  { height: 44px; animation-delay: 0.2s;  }
        .lbar:nth-child(10) { height: 30px; animation-delay: 0.1s;  }
        .lbar:nth-child(11) { height: 18px; animation-delay: 0s;    }
        @keyframes loadWave {
            0%, 100% { transform: scaleY(0.3); opacity: 0.35; }
            50%       { transform: scaleY(1);   opacity: 1;    }
        }

        /* Pulsing ring behind waveform */
        .pulse-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            animation: pulseRing 3s ease-out infinite;
        }
        .pulse-ring:nth-child(2) { animation-delay: 1s; }
        .pulse-ring:nth-child(3) { animation-delay: 2s; }
        @keyframes pulseRing {
            0%   { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(2.2); opacity: 0;   }
        }

        .wave-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 240px;
            height: 120px;
        }

        /* Text */
        .loading-msg {
            color: var(--white);
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
            opacity: 1;
            transition: opacity 0.4s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-label {
            color: var(--neutral-500);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Progress bar */
        .loading-progress-wrap {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            height: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .loading-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--white);
            border-radius: 99px;
            animation: loadFill 12s linear forwards;
        }
        @keyframes loadFill {
            from { width: 0%; }
            to   { width: 100%; }
        }

        @media (max-width: 767px) {
            .loading-msg { font-size: 17px; }
            .lbar:nth-child(6) { height: 64px; }
            .loading-wave { height: 64px; gap: 5px; }
        }
    </style>

    <script>
    (function () {
        var params   = new URLSearchParams(window.location.search);
        var business = params.get('business') || 'afacerea ta';
        var pkg      = params.get('package') || '';

        var messages = [
            'Analizăm profilul afacerii "' + business + '"...',
            'Configurăm vocea și personalitatea agentului...',
            'Integrăm programul și serviciile tale...',
            'Ultimele ajustări...'
        ];

        var msgEl = document.getElementById('loading-msg');
        msgEl.textContent = messages[0];

        var idx = 0;
        var cycleInterval = setInterval(function () {
            idx++;
            if (idx >= messages.length) { clearInterval(cycleInterval); return; }
            msgEl.style.opacity = '0';
            setTimeout(function () {
                msgEl.textContent = messages[idx];
                msgEl.style.opacity = '1';
            }, 400);
        }, 3000);

        // Redirect after 12 seconds
        setTimeout(function () {
            window.location.href = 'agent-ready.html?business=' + encodeURIComponent(business) + '&package=' + encodeURIComponent(pkg);
        }, 12000);
    })();
    </script>
